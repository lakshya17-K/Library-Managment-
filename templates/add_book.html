<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-light">

    <div class="container mt-5">

        <div class="card bg-black border-secondary shadow-lg p-4">

            <h1 class="mb-4 text-center">
                Add New Book
            </h1>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Book ID
                    </label>

                    <input type="number"
                           name="id"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Book Title
                    </label>

                    <input type="text"
                           name="title"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Author Name
                    </label>

                    <input type="text"
                           name="author"
                           class="form-control"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-success w-100">

                    Add Book

                </button>

            </form>

            <a href="/"
               class="btn btn-outline-light mt-3">

                Back to Home

            </a>

        </div>

    </div>

</body>
</html>
