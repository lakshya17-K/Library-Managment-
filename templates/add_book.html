<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
</head>
<body>

    <h1>Add Book</h1>

    <form method="POST">

        <label>Book ID</label>
        <br>

        <input type="number" name="id" required>

        <br><br>

        <label>Book Title</label>
        <br>

        <input type="text" name="title" required>

        <br><br>

        <label>Author Name</label>
        <br>

        <input type="text" name="author" required>

        <br><br>

        <button type="submit">
            Add Book
        </button>

    </form>

    <br>

    <a href="/">Back to Home</a>

</body>
</html>
