<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 12px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #38bdf8;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>➕ Add Book</h2>

    <form action="/add_book" method="POST">
        <input name="title" placeholder="Book Name" required><br>
        <button type="submit">Add</button>
    </form>

    <a href="/">Back</a>
</div>

</body>
</html>
