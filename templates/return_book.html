<!DOCTYPE html>
<html>
<head>
    <title>Return Book</title>
</head>
<body>

    <h1>Return Book</h1>

    <form method="POST">

        <label>Book ID</label>
        <br>

        <input type="number" name="book_id" required>

        <br><br>

        <button type="submit">
            Return Book
        </button>

    </form>

    <br>

    {% if fine is not none %}

        <h2>
            Fine: ₹{{ fine }}
        </h2>

    {% endif %}

    <a href="/">Back to Home</a>

</body>
</html>
