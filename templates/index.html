<!DOCTYPE html>
<html>
<head>
    <title>Library Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .box {
            background: rgba(255,255,255,0.05);
            margin: 15px auto;
            padding: 20px;
            width: 60%;
            border-radius: 12px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            transform: scale(1.05);
        }

        a {
            color: #38bdf8;
        }

        #reply {
            color: #38bdf8;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>📚 Welcome {{ user }}</h2>
<a href="/logout">Logout</a>

<div class="box">
    <h3>📖 Books</h3>
    <ul>
        {% for b in books %}
            <li>{{ b.title }} - {{ b.status }}</li>
        {% endfor %}
    </ul>
</div>

<div class="box">
    <h3>🤖 Chatbot</h3>

    <input id="msg" placeholder="Ask something">
    <button onclick="chat()">Send</button>

    <p id="reply"></p>
</div>

<script>
async function chat() {
    let msg = document.getElementById("msg").value;

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    });

    let data = await res.json();

    let reply = document.getElementById("reply");
    reply.style.opacity = 0;

    setTimeout(() => {
        reply.innerText = "🤖 " + data.reply;
        reply.style.opacity = 1;
    }, 200);
}
</script>

</body>
</html>
