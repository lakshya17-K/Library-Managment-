<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
      rel="stylesheet">

<style>

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        -45deg,
        #020617,
        #0f172a,
        #1e1b4b,
        #312e81
    );

    background-size:400% 400%;

    animation:bgAnimation 12s ease infinite;

    overflow:hidden;
}

@keyframes bgAnimation{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.register-box{

    width:430px;

    padding:45px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.1);

    color:white;
}

.logo{

    text-align:center;

    font-size:65px;

    color:#60a5fa;

    margin-bottom:15px;
}

.input-box{

    position:relative;

    margin-bottom:20px;
}

.input-box i{

    position:absolute;

    top:18px;
    left:15px;

    color:#cbd5e1;
}

.input-box input{

    width:100%;

    height:55px;

    border:none;

    border-radius:15px;

    background:rgba(255,255,255,0.1);

    padding-left:45px;

    color:white;
}

.register-btn{

    width:100%;

    height:55px;

    border:none;

    border-radius:15px;

    background:linear-gradient(
        45deg,
        #16a34a,
        #22c55e
    );

    color:white;

    font-size:18px;

    font-weight:bold;
}

.login-link{

    text-align:center;

    margin-top:20px;
}

.login-link a{

    color:#60a5fa;

    text-decoration:none;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="register-box"
     data-aos="zoom-in">

    <div class="logo">

        <i class="fa-solid fa-user-plus"></i>

    </div>

    <h2 class="text-center mb-4">

        Create Account

    </h2>

    <form method="POST">

        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input type="text"
                   name="username"
                   placeholder="Create Username"
                   required>

        </div>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input type="password"
                   name="password"
                   placeholder="Create Password"
                   required>

        </div>

        <button type="submit"
                class="register-btn">

            Register

        </button>

    </form>

    <div class="login-link">

        <a href="/login">

            Already have an account?

        </a>

    </div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({
    duration:1400
});

</script>

</body>

</html>
