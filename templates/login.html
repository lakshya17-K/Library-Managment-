<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
        135deg,
        #0f172a,
        #312e81
    );

    color:white;
}

.login-box{

    width:400px;

    padding:40px;

    border-radius:20px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

button{

    height:50px;

    border-radius:12px;
}

</style>

</head>

<body>

<div class="login-box">

    <h1 class="text-center mb-4">

        🔐 Login

    </h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               class="form-control mb-3"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               class="form-control mb-4"
               required>

        <button type="submit"
                class="btn btn-primary w-100">

            Login

        </button>

    </form>

    <div class="mt-4 text-center">

        <p>
            admin / admin123
        </p>

        <p>
            student / student123
        </p>

    </div>

</div>

</body>

</html>
