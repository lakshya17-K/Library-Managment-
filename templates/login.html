<!DOCTYPE html>
<html>
<head>
    <title>Login - Library System</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            animation: fadeIn 0.8s ease-in;
            padding-top: 80px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 12px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 80%;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📚 Library Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required><br>
        <input type="password" name="password" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>

    <p>admin / 1234</p>
</div>

</body>
</html>
