<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Future Library Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:Arial,sans-serif;

    background:linear-gradient(
        -45deg,
        #020617,
        #0f172a,
        #1e1b4b,
        #312e81
    );

    background-size:400% 400%;

    animation:bgAnimation 12s ease infinite;
}

@keyframes bgAnimation{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

.circle{

    position:absolute;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    animation:float 7s infinite ease-in-out;
}

.circle1{

    width:250px;
    height:250px;

    top:-80px;
    left:-80px;
}

.circle2{

    width:300px;
    height:300px;

    bottom:-100px;
    right:-100px;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-30px);
    }

    100%{
        transform:translateY(0px);
    }
}

.login-box{

    width:430px;

    padding:45px;

    border-radius:30px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.1);

    box-shadow:
    0 8px 32px rgba(0,0,0,0.5);

    color:white;

    z-index:2;
}

.logo{

    text-align:center;

    font-size:65px;

    margin-bottom:15px;

    color:#60a5fa;

    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.1);
    }

    100%{
        transform:scale(1);
    }
}

.input-box{

    position:relative;

    margin-bottom:22px;
}

.input-box i{

    position:absolute;

    top:18px;
    left:15px;

    color:#cbd5e1;
}

.input-box input{

    width:100%;

    height:55px;

    border:none;

    border-radius:15px;

    background:rgba(255,255,255,0.1);

    padding-left:45px;

    color:white;

    transition:0.3s;
}

.input-box input:focus{

    outline:none;

    transform:scale(1.03);

    box-shadow:
    0 0 15px rgba(96,165,250,0.7);
}

.login-btn{

    width:100%;

    height:55px;

    border:none;

    border-radius:15px;

    background:linear-gradient(
        45deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:18px;

    font-weight:bold;

    transition:0.3s;
}

.login-btn:hover{

    transform:scale(1.05);
}

.alert{

    border-radius:15px;
}

.register-link{

    text-align:center;

    margin-top:25px;
}

.register-link a{

    color:#60a5fa;

    text-decoration:none;

    font-weight:bold;
}

</style>

</head>

<body>

<div class="circle circle1"></div>

<div class="circle circle2"></div>

<div class="login-box"
     data-aos="zoom-in">

    <div class="logo">

        <i class="fa-solid fa-book-open-reader"></i>

    </div>

    <h2 class="text-center mb-4">

        Future Library

    </h2>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            <div class="alert alert-danger text-center">

                {{ messages[0] }}

            </div>

        {% endif %}

    {% endwith %}

    <form method="POST">

        <div class="input-box">

            <i class="fa-solid fa-user"></i>

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

        </div>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

        </div>

        <button type="submit"
                class="login-btn">

            <i class="fa-solid fa-right-to-bracket"></i>

            Login

        </button>

    </form>

    <div class="register-link">

        <a href="/register">

            Create New Account

        </a>

    </div>

</div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>

AOS.init({
    duration:1400
});

</script>

</body>

</html>
